<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Consulta de Valores · Aviso ao Cidadão</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
    }

    body {
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    /* Card principal com borda sutil laranja/bege */
    .card {
      max-width: 480px;
      width: 100%;
      background: #ffffff;
      border-radius: 1.5rem;
      border: 3px solid #fde0c5;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
      overflow: hidden;
    }

    /* Cabeçalho Verde Escuro */
    .header {
      background-color: #03695d;
      padding: 1.2rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: white;
      position: relative;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .icon-shield {
      background: #fca311;
      border-radius: 8px;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .header-titles {
      display: flex;
      flex-direction: column;
    }

    .header-subtitle {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      opacity: 0.9;
    }

    .header-title {
      font-size: 1rem;
      font-weight: 700;
    }

    .ativo-badge {
      font-size: 0.75rem;
      font-weight: 700;
      color: #fca311;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .ativo-dot {
      width: 8px;
      height: 8px;
      background-color: #fca311;
      border-radius: 50%;
    }

    /* Detalhe Laranja abaixo do header */
    .header-border {
      height: 4px;
      background-color: #fca311;
      width: 40%;
      margin: 0 auto;
    }

    /* Conteúdo interno */
    .card-inner {
      padding: 2rem 1.5rem;
      text-align: center;
    }

    /* Ícone de Check Central */
    .check-circle {
      width: 70px;
      height: 70px;
      background-color: #009879;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }

    /* Badge "Consulta Gratuita" */
    .badge-consulta {
      display: inline-block;
      background: #fcb77a;
      color: #000;
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.5px;
      padding: 0.4rem 1.2rem;
      border-radius: 50px;
      margin-bottom: 1.5rem;
    }

    /* Títulos e Textos */
    h1 {
      font-size: 1.8rem;
      font-weight: 800;
      color: #112d4e;
      line-height: 1.2;
      margin-bottom: 1rem;
    }

    .underline-orange {
      border-bottom: 4px solid #fca311;
      padding-bottom: 2px;
    }

    .description {
      font-size: 0.95rem;
      color: #4b5563;
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    /* Botão Principal com Glow */
    .btn-consultar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      width: 100%;
      background-color: #009879;
      border: none;
      padding: 1.2rem;
      font-size: 1.1rem;
      font-weight: 800;
      color: white;
      border-radius: 12px;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 0 25px rgba(0, 152, 121, 0.4);
      transition: all 0.3s;
      margin-bottom: 1rem;
    }

    .btn-consultar:hover {
      transform: scale(0.98);
      box-shadow: 0 0 15px rgba(0, 152, 121, 0.6);
    }

    /* Rodapé Seguro */
    .footer-safe {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      font-size: 0.75rem;
      color: #374151;
      font-weight: 500;
      margin-bottom: 1.5rem;
    }

    /* Box Plataforma Independente */
    .info-box {
      background: #f0f7f6;
      border-left: 4px solid #009879;
      padding: 1rem;
      border-radius: 8px;
      font-size: 0.8rem;
      color: #374151;
      font-weight: 500;
      margin-bottom: 1rem;
    }

    /* Links do rodapé */
    .footer-links {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin-top: 1rem;
    }

    .footer-links a {
      color: #9ca3af;
      text-decoration: none;
      font-size: 0.7rem;
      transition: 0.2s;
    }

    .footer-links a:hover {
      color: #4b5563;
    }

    /* Páginas Legais */
    .legal-page {
      padding: 2rem;
    }
    .legal-page h1 { font-size: 1.5rem; color: #03695d; }
    .legal-page h2 { font-size: 1.1rem; color: #112d4e; margin: 1rem 0 0.5rem; }
    .legal-page p { font-size: 0.9rem; color: #4b5563; margin-bottom: 0.5rem; }
    
    .btn-back {
      background: #f0f7f6;
      padding: 0.6rem 1.5rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      color: #03695d;
      margin-top: 1.5rem;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    let currentView = 'home';
    const DESTINO_URL = 'https://paypath-pal.lovable.app';

    const politicaHTML = `
      <div class="card">
        <div class="legal-page">
          <h1>Política de Privacidade</h1>
          <p><strong>Última atualização:</strong> 29/05/2026</p>
          <h2>1. Quem somos</h2>
          <p>Plataforma independente com caráter informativo e educativo.</p>
          <button class="btn-back" id="backBtn">← Voltar</button>
        </div>
      </div>
    `;

    const termosHTML = `
      <div class="card">
        <div class="legal-page">
          <h1>Termos de Uso</h1>
          <p><strong>Última atualização:</strong> 29/05/2026</p>
          <h2>1. Aceitação</h2>
          <p>Ao acessar este site, você declara ter lido e aceitado estes Termos.</p>
          <button class="btn-back" id="backBtn">← Voltar</button>
        </div>
      </div>
    `;

    const homeHTML = `
      <div class="card">
        <div class="header">
          <div class="header-left">
            <div class="icon-shield">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path><polyline points="9 12 11 14 15 10"></polyline></svg>
            </div>
            <div class="header-titles">
              <span class="header-subtitle">Comunicado</span>
              <span class="header-title">Aviso ao Cidadão</span>
            </div>
          </div>
          <div class="ativo-badge">
            <div class="ativo-dot"></div> ATIVO
          </div>
        </div>
        <div class="header-border"></div>

        <div class="card-inner">
          <div class="check-circle">
            <svg width="35" height="35" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
          </div>
          
          <div class="badge-consulta">CONSULTA GRATUITA</div>
          
          <h1>Existem valores liberados no seu <span class="underline-orange">CPF?</span></h1>
          
          <p class="description">
            Descubra em segundos se há quantias disponíveis para resgate vinculadas ao seu CPF.
          </p>
          
          <a href="${DESTINO_URL}" class="btn-consultar">
            CONSULTAR AGORA 
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
          </a>
          
          <div class="footer-safe">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#009879" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            Conexão segura · LGPD em conformidade
          </div>
          
          <div class="info-box">
            Plataforma independente. Nenhum dado sensível é solicitado.
          </div>

          <div class="footer-links">
            <a href="#" id="linkPolitica">Política de Privacidade</a>
            <a href="#" id="linkTermos">Termos de Uso</a>
          </div>
        </div>
      </div>
    `;

    function render() {
      const root = document.getElementById('app');
      if (!root) return;

      if (currentView === 'home') {
        root.innerHTML = homeHTML;
        
        const linkPolitica = document.getElementById('linkPolitica');
        const linkTermos = document.getElementById('linkTermos');

        if (linkPolitica) linkPolitica.addEventListener('click', (e) => { e.preventDefault(); currentView = 'politica'; render(); });
        if (linkTermos) linkTermos.addEventListener('click', (e) => { e.preventDefault(); currentView = 'termos'; render(); });
      } 
      else if (currentView === 'politica' || currentView === 'termos') {
        root.innerHTML = currentView === 'politica' ? politicaHTML : termosHTML;
        const backBtn = document.getElementById('backBtn');
        if (backBtn) backBtn.addEventListener('click', () => { currentView = 'home'; render(); });
      }
    }

    render();
  </script>
</body>
</html>
